<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For เพื่อน </title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Background element to spawn pleading messages -->
    <div id="bg-messages-container"></div>
    
    <div class="container active" id="main-container">
        <div class="kitty-img bounce">
            <img src="https://i.pinimg.com/originals/cc/f6/77/ccf67785235094448b9c0d28c8ceb9b9.gif" alt="Hello Kitty Cute">
        </div>
        <h1 class="title">แฟนเก่าคนโปรดที่ชื่อ "เพื่อน"<br>กลับมาใจอ่อนได้ไหม?</h1>
        <div class="buttons">
            <button id="yes-btn" class="btn yes">กลับมา 💖</button>
            <button id="no-btn" class="btn no">ไม่กลับมา 💔</button>
        </div>
    </div>

    <div id="success-screen" class="hidden">
        <div class="polaroid-slider fade-in delay-1" id="polaroid-slider">
            <!-- Polaroids will be injected here via JS -->
        </div>
        <p class="swipe-instruction fade-in delay-1">เลื่อนซ้ายขวาดูรูปได้เลยน้า 👉</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
